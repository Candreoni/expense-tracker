<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expenses">
<meta name="theme-color" content="#1a1916">
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2ED;--surface:#FFF;--border:#E2DED7;--border-s:#C8C4BC;
  --text:#1A1916;--muted:#78756E;--hint:#B5B2AA;
  --accent:#1A1916;--accent-l:#F0EDE8;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:16px}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

/* Topbar */
.topbar{background:var(--accent);color:#fff;padding:calc(14px + var(--safe-top)) 20px 14px;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:500;letter-spacing:-.3px}
.topbar-sub{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.topbar-sub span{font-size:12px;opacity:.6;display:flex;align-items:center;gap:5px}
.live{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sheet-btn{font-size:12px;color:#fff;opacity:.7;text-decoration:none;border:1px solid rgba(255,255,255,.3);padding:4px 12px;border-radius:20px}

/* Body scroll */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(16px + var(--safe-bot))}

/* Upload */
.drop{border:1.5px dashed var(--border-s);border-radius:16px;background:var(--surface);padding:36px 20px;text-align:center;position:relative;margin-bottom:16px;transition:background .15s}
.drop.over{background:var(--accent-l);border-color:var(--accent)}
.drop input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.drop-icon{width:52px;height:52px;margin:0 auto 14px;background:var(--accent-l);border-radius:50%;display:flex;align-items:center;justify-content:center}
.drop-icon svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:1.6}
.drop h2{font-size:16px;font-weight:500;margin-bottom:5px}
.drop p{font-size:13px;color:var(--muted)}
#preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:none}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;margin-bottom:14px}
.reading{background:#FEF3C7;color:#92400E}
.done{background:#DCFCE7;color:#166534}
.err{background:#FEE2E2;color:#991B1B}
.spin{width:11px;height:11px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Form */
.card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;display:none}
.card.show{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{
  width:100%;border:1px solid var(--border-s);border-radius:10px;
  padding:13px;font-size:16px;font-family:'DM Sans',sans-serif;
  background:var(--surface);color:var(--text);outline:none;
  -webkit-appearance:none;appearance:none;transition:border-color .12s;
}
.field select{-webkit-appearance:menulist;appearance:menulist;padding-right:8px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:none;height:68px;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.amt-w{position:relative}
.amt-w i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-style:normal;pointer-events:none}
.amt-w input{padding-left:24px}

/* Buttons */
.btn{width:100%;padding:15px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .1s,transform .08s}
.btn:active{transform:scale(.98)}
.primary{background:var(--accent);color:#fff;margin-top:6px}
.primary:disabled{opacity:.35}
.ghost{background:transparent;color:var(--muted);border:1px solid var(--border-s);margin-top:8px}

/* Log */
.log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.log-hdr h2{font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.log-total{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.entry{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;gap:10px;animation:fi .2s ease}
.entry.s-syncing{border-color:#93C5FD}
.entry.s-synced{border-color:#86EFAC}
.entry.s-error{border-color:#FCA5A5}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.e-l{flex:1;min-width:0}
.e-merchant{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-meta{font-size:12px;color:var(--muted);margin-top:2px}
.e-desc{font-size:12px;color:var(--hint);margin-top:1px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-r{text-align:right;flex-shrink:0}
.e-amt{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
.e-cat{font-size:11px;padding:2px 8px;border-radius:10px;margin-top:4px;display:inline-block}
.e-sync{font-size:11px;margin-top:4px;display:block}
.empty{text-align:center;padding:36px 0;color:var(--hint);font-size:14px}

/* Category colors */
.cf{background:#FEF3C7;color:#92400E}.cg{background:#FEF3C7;color:#92400E}
.cgas{background:#DBEAFE;color:#1E40AF}.ct{background:#DBEAFE;color:#1E40AF}.cp{background:#DBEAFE;color:#1E40AF}
.ch{background:#D1FAE5;color:#065F46}.cm{background:#D1FAE5;color:#065F46}
.cmed{background:#FCE7F3;color:#9D174D}.cpc{background:#FCE7F3;color:#9D174D}.ccc{background:#FCE7F3;color:#9D174D}
.co{background:#EDE9FE;color:#5B21B6}.cs{background:#EDE9FE;color:#5B21B6}.cte{background:#EDE9FE;color:#5B21B6}
.ce{background:#FFEDD5;color:#9A3412}.ctr{background:#FFEDD5;color:#9A3412}.ccl{background:#FFEDD5;color:#9A3412}
.cot{background:#F1F5F9;color:#475569}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Expense Tracker</h1>
    <div class="topbar-sub">
      <span><span class="live"></span> Live sync · Google Sheets</span>
      <a href="https://docs.google.com/spreadsheets/d/1hy5BjFRdKSwLrU7wGQPf98jYpC_HAfrNYu9UDlE5sBU/edit" target="_blank" class="sheet-btn">Open Sheet ↗</a>
    </div>
  </div>

  <div class="body">
    <div style="height:16px"></div>
    <div class="drop" id="drop">
      <input type="file" accept="image/*" capture="environment" id="fileIn">
      <img id="preview">
      <div class="drop-icon" id="upIcon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <h2 id="upTitle">Snap or upload a receipt</h2>
      <p id="upSub">Tap to use camera or choose a photo</p>
    </div>

    <div class="card" id="card">
      <div id="badge"></div>
      <div class="field"><label>Merchant</label><input type="text" id="merchant" placeholder="Store or vendor" autocomplete="off"></div>
      <div class="two">
        <div class="field"><label>Date</label><input type="text" id="date" placeholder="MM/DD" inputmode="numeric"></div>
        <div class="field"><label>Amount</label><div class="amt-w"><i>$</i><input type="number" id="amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div></div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="category">
          <option value="" disabled selected>Select category...</option>
          <optgroup label="🍽 Food &amp; Drink"><option value="Food">Food</option><option value="Groceries">Groceries</option></optgroup>
          <optgroup label="🚗 Transport"><option value="Gas">Gas</option><option value="Transportation">Transportation</option><option value="Parking">Parking</option></optgroup>
          <optgroup label="🏠 Home"><option value="Household">Household</option><option value="Maintenance">Maintenance</option></optgroup>
          <optgroup label="❤️ Health"><option value="Medical">Medical</option><option value="Personal Care">Personal Care</option><option value="Childcare">Childcare</option></optgroup>
          <optgroup label="💼 Work"><option value="Office Supplies">Office Supplies</option><option value="Shipping">Shipping</option><option value="Tech / Electronics">Tech / Electronics</option></optgroup>
          <optgroup label="✈️ Lifestyle"><option value="Entertainment">Entertainment</option><option value="Travel">Travel</option><option value="Clothing">Clothing</option></optgroup>
          <optgroup label="📦 Other"><option value="Other">Other</option></optgroup>
        </select>
      </div>
      <div class="field"><label>Description</label><textarea id="description" placeholder="What was this for?"></textarea></div>
      <button class="btn primary" id="addBtn" onclick="addExp()">Add to log + sync to Sheet</button>
      <button class="btn ghost" onclick="resetAll()">Cancel</button>
    </div>

    <div class="log-hdr">
      <h2>This month</h2>
      <span class="log-total" id="tot">$0.00</span>
    </div>
    <div id="logList"><div class="empty">No expenses logged yet</div></div>
    <div style="height:20px"></div>
  </div>
</div>

<script>
const ENDPOINT='https://script.google.com/macros/s/AKfycbxnwCNd6ZJVg25EzJjF4chl0WOeDs1EMijcCe1mDdzZ89aENJ1LBgys6cSAaibLcA_W/exec';
const CAT_CLS={"Food":"cf","Groceries":"cg","Gas":"cgas","Transportation":"ct","Parking":"cp","Household":"ch","Maintenance":"cm","Medical":"cmed","Personal Care":"cpc","Childcare":"ccc","Office Supplies":"co","Shipping":"cs","Tech / Electronics":"cte","Entertainment":"ce","Travel":"ctr","Clothing":"ccl","Other":"cot"};
let expenses=[];

const drop=document.getElementById('drop');
const fileIn=document.getElementById('fileIn');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over')}));
['dragleave','dragend'].forEach(ev=>drop.addEventListener(ev,()=>drop.classList.remove('over')));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');go(e.dataTransfer.files[0])});
fileIn.addEventListener('change',e=>go(e.target.files[0]));

function go(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const src=e.target.result,b64=src.split(',')[1],mime=file.type||'image/jpeg';
    document.getElementById('preview').src=src;
    document.getElementById('preview').style.display='block';
    document.getElementById('upIcon').style.display='none';
    document.getElementById('upTitle').style.display='none';
    document.getElementById('upSub').style.display='none';
    document.getElementById('card').classList.add('show');
    clearForm();readReceipt(b64,mime);
  };
  r.readAsDataURL(file);
}

function setBadge(cls,html){document.getElementById('badge').innerHTML=`<span class="badge ${cls}">${html}</span>`}

async function readReceipt(b64,mime){
  setBadge('reading','<span class="spin"></span> Reading receipt...');
  document.getElementById('addBtn').disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,
        system:'Extract expense data from receipt images. Reply ONLY with valid JSON, no markdown. Format: {"merchant":"","date":"MM/DD","amount":"","category":"","description":""}. Category must be exactly one of: Food, Groceries, Gas, Transportation, Parking, Household, Maintenance, Medical, Personal Care, Childcare, Office Supplies, Shipping, Tech / Electronics, Entertainment, Travel, Clothing, Other. Amount is a plain number no $ or commas.',
        messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Extract expense details from this receipt.'}]}]})
    });
    const d=await res.json();
    const raw=(d.content?.find(b=>b.type==='text')?.text||'').replace(/```json|```/g,'').trim();
    const j=JSON.parse(raw);
    if(j.merchant)document.getElementById('merchant').value=j.merchant;
    if(j.date)document.getElementById('date').value=j.date;
    if(j.amount)document.getElementById('amount').value=parseFloat(j.amount).toFixed(2);
    if(j.category){const sel=document.getElementById('category');for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===j.category){sel.selectedIndex=i;break;}}}
    if(j.description)document.getElementById('description').value=j.description;
    setBadge('done','✓ Review and confirm');
  }catch(e){setBadge('err','✕ Could not read — fill in manually');}
  document.getElementById('addBtn').disabled=false;
  document.getElementById('card').scrollIntoView({behavior:'smooth',block:'start'});
}

async function addExp(){
  const merchant=document.getElementById('merchant').value.trim();
  const date=document.getElementById('date').value.trim();
  const amount=parseFloat(document.getElementById('amount').value);
  const category=document.getElementById('category').value;
  const description=document.getElementById('description').value.trim();
  if(!merchant||!amount||!category){alert('Merchant, amount and category are required.');return;}
  const entry={merchant,date,amount,category,description,id:Date.now(),sync:'syncing'};
  expenses.unshift(entry);render();resetAll();
  try{
    const res=await fetch(ENDPOINT,{method:'POST',body:JSON.stringify({merchant,date,amount,category,description})});
    const data=await res.json();
    entry.sync=data.status==='ok'?'synced':'error';
    entry.row=data.row;
  }catch(e){entry.sync='error';}
  render();
}

function render(){
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  document.getElementById('tot').textContent='$'+total.toFixed(2);
  const el=document.getElementById('logList');
  if(!expenses.length){el.innerHTML='<div class="empty">No expenses logged yet</div>';return;}
  el.innerHTML=expenses.map(e=>{
    const si=e.sync==='syncing'
      ?`<span class="e-sync" style="color:#3B82F6"><span class="spin" style="display:inline-block;width:9px;height:9px;border-width:1.2px;vertical-align:middle;margin-right:3px"></span>Syncing...</span>`
      :e.sync==='synced'
      ?`<span class="e-sync" style="color:#16A34A">✓ Saved${e.row?' · row '+e.row:''}</span>`
      :`<span class="e-sync" style="color:#DC2626">✕ Sync failed</span>`;
    return`<div class="entry s-${e.sync}">
      <div class="e-l">
        <div class="e-merchant">${e.merchant}</div>
        <div class="e-meta">${e.date||'—'}${e.category?' · '+e.category:''}</div>
        ${e.description?`<div class="e-desc">${e.description}</div>`:''}
      </div>
      <div class="e-r">
        <div class="e-amt">$${e.amount.toFixed(2)}</div>
        ${e.category?`<span class="e-cat ${CAT_CLS[e.category]||'cot'}">${e.category}</span>`:''}
        ${si}
      </div>
    </div>`;
  }).join('');
}

function clearForm(){
  ['merchant','date','amount','description'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('category').selectedIndex=0;
  document.getElementById('badge').innerHTML='';
}

function resetAll(){
  document.getElementById('card').classList.remove('show');
  document.getElementById('preview').style.display='none';
  document.getElementById('preview').src='';
  document.getElementById('upIcon').style.display='flex';
  document.getElementById('upTitle').style.display='block';
  document.getElementById('upSub').style.display='block';
  fileIn.value='';clearForm();
}
</script>
</body>
</html>
